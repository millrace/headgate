name: headgate zip

# Builds headgate.zip — the headgate source bundle the Millrace menu app downloads,
# then `mojo build`s on-device. See scripts/package_headgate.sh. Mirrors
# mojo-backend's engine-zip.yml.
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    paths: ["scripts/package_headgate.sh", ".github/workflows/headgate-zip.yml"]
  workflow_dispatch:

permissions:
  contents: write # to attach the zip to a Release on tags

jobs:
  zip:
    runs-on: macos-14
    steps:
      # Lay the repos out as siblings, matching the dev layout the package script
      # and the `-I ../flare -I ../json -I ../minja2/src` build assume.
      - uses: actions/checkout@v6
        with:
          path: headgate
      - uses: actions/checkout@v6
        with:
          repository: millrace/flare
          path: flare
      - uses: actions/checkout@v6
        with:
          repository: millrace/json
          path: json
      - uses: actions/checkout@v6
        with:
          repository: millrace/minja2
          path: minja2

      - uses: prefix-dev/setup-pixi@v0.9.6
        with:
          manifest-path: headgate/pixi.toml

      # Node for the web UI build (package_headgate.sh runs `npm ci && npm run build`).
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build flare FFI shims (libflare_tls/zlib/brotli/fs)
        working-directory: headgate
        run: pixi run flare-ffi

      - name: Package headgate.zip
        working-directory: headgate
        run: pixi run bash scripts/package_headgate.sh "$GITHUB_WORKSPACE/headgate.zip"

      - uses: actions/upload-artifact@v7
        with:
          name: headgate-zip
          path: headgate.zip
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: headgate.zip
