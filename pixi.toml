[workspace]
name = "headgate"
version = "0.0.1"
authors = ["Marius S <marius@seritan.net>"]
description = "Privacy harness: a frontier model writes code that runs on private data locally; the data never leaves the machine. See README.md / PRIOR-ART.md."
# Nightly Mojo, pinned to the org nightly. flare + json forks are on this nightly
# (json ported, mozz disabled), so headgate matches: `-I ../flare` (HTTP transport,
# pulls `-I ../json` transitively) and `-I ../minja2/src` (templating) all resolve
# against the same toolchain. See PRIOR-ART.md.
channels = [
    "https://conda.modular.com/max-nightly",
    "conda-forge",
]
platforms = ["osx-arm64"]

[dependencies]
mojo = "==1.0.0b2.dev2026060706"
# flare's runtime deps — needed to build flare's FFI shims into this env (the
# `flare-ffi` task) so flare's HTTP/TLS client works when consumed via -I ../flare.
openssl          = ">=3.6.1,<4"
ca-certificates  = ">=2025.1.31"
zlib             = ">=1.3.1,<2"
libbrotlicommon  = ">=1,<2"
libbrotlidec     = ">=1,<2"
libbrotlienc     = ">=1,<2"

[tasks]
# The verified containment boundary (SPIKE.md). Pure shell + sandbox-exec — needs
# no Mojo toolchain, so this runs even before `pixi install` finishes.
spike = "./sandbox/spike.sh"

# Build flare's FFI shims (libflare_tls/zlib/brotli/fs) into THIS env's
# $CONDA_PREFIX/lib so flare's HTTP/TLS client works when consumed via -I ../flare.
# Sourced (the scripts use `return`); idempotent. Mirrors mojo-backend's flare-tls.
flare-ffi = "bash -c 'source ../flare/flare/tls/ffi/build.sh; source ../flare/flare/http/ffi/build.sh'"

# Compile probe: prove flare's HttpClient is usable from headgate's env.
flare-probe = { cmd = "mkdir -p build && mojo build src/flare_probe.mojo -I ../flare -I ../json -o build/flare-probe && ./build/flare-probe", depends-on = ["flare-ffi"] }

# Runtime-verify LocalClient's flare HTTP path against a canned OpenAI server.
local-probe = { cmd = "mkdir -p build && python3 scripts/local_test_server.py & SRV=$!; sleep 1; mojo build src/local_probe.mojo -I ../flare -I ../json -o build/local-probe && ./build/local-probe; R=$?; kill $SRV 2>/dev/null; exit $R", depends-on = ["flare-ffi"] }

# FIRST VERTICAL SLICE — compiles + runs today. Renders the Seatbelt profile and
# execs under sandbox-exec from Mojo (src/sandbox.mojo), then verifies containment
# (mirrors the spike, but Mojo-driven). This is what `pixi run build` produces.
build        = { cmd = "mkdir -p build && mojo build src/sandbox_demo.mojo -o build/sandbox-demo" }
sandbox-demo = { cmd = "mkdir -p build && mojo build src/sandbox_demo.mojo -o build/sandbox-demo && ./build/sandbox-demo" }

# Offline check of the real CSV SchemaSanitizer (aliasing + type inference +
# synthetic samples + dealias round-trip). No network/model needed.
schema-demo  = { cmd = "mkdir -p build && mojo build src/schema_demo.mojo -o build/schema-demo && ./build/schema-demo" }

# Proves the EgressGuard blocks real-data fingerprints + canary tokens while
# letting clean payloads through (confidentiality is actually enforced).
egress-test  = { cmd = "mkdir -p build && mojo build src/egress_test.mojo -o build/egress-test && ./build/egress-test" }

# Compile generated Mojo -> run it in the sandbox. Proves the codegen->run
# pipeline end to end: benign code computes over real data; malicious code
# (reads $HOME) is contained.
pipeline-demo = { cmd = "mkdir -p build && mojo build src/pipeline_demo.mojo -o build/pipeline-demo && ./build/pipeline-demo" }

# FULL THIN SLICE end to end (mock model): sanitize CSV -> guarded codegen (mock)
# -> dealias + inject path -> compile + run in sandbox -> print the result. Run
# under pixi so CONDA_PREFIX/PATH are set for the in-process compile step.
e2e-demo = { cmd = "mkdir -p demo/data demo/scratch build && printf 'name,age\\nalice,30\\nbob,25\\ncarol,41\\n' > demo/data/records.csv && mojo build src/headgate.mojo -I ../flare -I ../json -I ../minja2/src -o build/headgate && HEADGATE_MOCK=1 ./build/headgate; rm -rf demo", depends-on = ["flare-ffi"] }

# Unit-test the remote-API token Budget (offline).
budget-test = { cmd = "mkdir -p build && mojo build src/budget_test.mojo -o build/budget-test && ./build/budget-test" }

# Verify the budget-depleted -> LOCAL routing: HEADGATE_REMOTE_TOKEN_BUDGET=0 forces
# codegen to the local model (a canned server returning a valid Mojo program), which
# then compiles + runs -> ROW_COUNT= 3. Proves routing without a real remote call.
budget-route-demo = { cmd = "mkdir -p demo/data demo/scratch build && printf 'name,age\\nalice,30\\nbob,25\\ncarol,41\\n' > demo/data/records.csv && python3 scripts/local_codegen_server.py & SRV=$!; sleep 1; mojo build src/headgate.mojo -I ../flare -I ../json -I ../minja2/src -o build/headgate && HEADGATE_REMOTE_TOKEN_BUDGET=0 HEADGATE_LOCAL_URL=http://127.0.0.1:8799 ./build/headgate; R=$?; kill $SRV 2>/dev/null; rm -rf demo; exit $R", depends-on = ["flare-ffi"] }

# Full composition root (src/headgate.mojo). transport.mojo now imports flare's
# HttpClient + json, so this needs -I ../flare -I ../json and the flare FFI shims.
build-full = { cmd = "mkdir -p build && mojo build src/headgate.mojo -I ../flare -I ../json -I ../minja2/src -o build/headgate", depends-on = ["flare-ffi"] }
