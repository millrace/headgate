[workspace]
name = "headgate"
version = "0.0.1"
authors = ["Marius S <marius@seritan.net>"]
description = "Privacy harness: a frontier model writes code that runs on private data locally; the data never leaves the machine. See README.md / PRIOR-ART.md."
# Nightly Mojo, pinned to the org nightly. flare + json forks are on this nightly
# (json ported, mozz disabled), so headgate matches: `-I ../flare` (HTTP transport,
# pulls `-I ../json` transitively) and `-I ../minja2/src` (templating) all resolve
# against the same toolchain. See PRIOR-ART.md.
channels = [
    "https://conda.modular.com/max-nightly",
    "conda-forge",
]
platforms = ["osx-arm64"]

[dependencies]
mojo = "==1.0.0b2.dev2026060706"

[tasks]
# The verified containment boundary (SPIKE.md). Pure shell + sandbox-exec — needs
# no Mojo toolchain, so this runs even before `pixi install` finishes.
spike = "./sandbox/spike.sh"

# FIRST VERTICAL SLICE — compiles + runs today. Renders the Seatbelt profile and
# execs under sandbox-exec from Mojo (src/sandbox.mojo), then verifies containment
# (mirrors the spike, but Mojo-driven). This is what `pixi run build` produces.
build        = { cmd = "mkdir -p build && mojo build src/sandbox_demo.mojo -o build/sandbox-demo" }
sandbox-demo = { cmd = "mkdir -p build && mojo build src/sandbox_demo.mojo -o build/sandbox-demo && ./build/sandbox-demo" }

# Offline check of the real CSV SchemaSanitizer (aliasing + type inference +
# synthetic samples + dealias round-trip). No network/model needed.
schema-demo  = { cmd = "mkdir -p build && mojo build src/schema_demo.mojo -o build/schema-demo && ./build/schema-demo" }

# Proves the EgressGuard blocks real-data fingerprints + canary tokens while
# letting clean payloads through (confidentiality is actually enforced).
egress-test  = { cmd = "mkdir -p build && mojo build src/egress_test.mojo -o build/egress-test && ./build/egress-test" }

# Compile generated Mojo -> run it in the sandbox. Proves the codegen->run
# pipeline end to end: benign code computes over real data; malicious code
# (reads $HOME) is contained.
pipeline-demo = { cmd = "mkdir -p build && mojo build src/pipeline_demo.mojo -o build/pipeline-demo && ./build/pipeline-demo" }

# FULL THIN SLICE end to end (mock model): sanitize CSV -> guarded codegen (mock)
# -> dealias + inject path -> compile + run in sandbox -> print the result. Run
# under pixi so CONDA_PREFIX/PATH are set for the in-process compile step.
e2e-demo = { cmd = "mkdir -p demo/data demo/scratch build && printf 'name,age\\nalice,30\\nbob,25\\ncarol,41\\n' > demo/data/records.csv && mojo build src/headgate.mojo -o build/headgate && HEADGATE_MOCK=1 ./build/headgate; rm -rf demo" }

# Full composition root (src/headgate.mojo) — the whole pi-shaped layer graph now
# COMPILES + runs (layers above the sandbox are stubs returning empty; the sandbox
# is real). -I ../flare reserved for when transport is wired (flare not imported
# yet); -I ../minja2/src: JSON + prompt templating.
build-full = { cmd = "mkdir -p build && mojo build src/headgate.mojo -I ../flare -I ../minja2/src -o build/headgate" }
